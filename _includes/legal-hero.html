<div class="legal-hero">
  <div class="container legal-hero-inner">
    <img src="{{ '/assets/icon.png' | relative_url }}" alt="" width="72" height="72" class="legal-hero-logo">
    <div>
      <p class="legal-hero-eyebrow">UmpCall · GullyDev</p>
      <h1 class="legal-hero-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="legal-hero-desc">{{ page.description }}</p>
      {% endif %}
    </div>
  </div>
</div>
