<footer class="site-footer">
  <div class="container footer-grid">
    <div class="footer-brand">
      <a class="footer-logo-link" href="{{ '/' | relative_url }}">
        {% include app-icon.html size="sm" %}
        <strong>UmpCall</strong>
      </a>
      <p>Offline-first cricket scoring for umpires, clubs &amp; spectators.</p>
      <p class="footer-meta">© {{ 'now' | date: '%Y' }} {{ site.developer }} · v{{ site.app_version }}</p>
    </div>
    <div class="footer-links">
      <h3>Legal</h3>
      <ul>
        <li><a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a></li>
        <li><a href="{{ '/support/' | relative_url }}">Support</a></li>
        <li><a href="{{ '/terms/' | relative_url }}">Terms of Service</a></li>
      </ul>
    </div>
    <div class="footer-links">
      <h3>Contact</h3>
      <ul>
        <li><a href="mailto:{{ site.support_email }}">{{ site.support_email }}</a></li>
        <li><a href="{{ '/support/' | relative_url }}">Help &amp; FAQs</a></li>
      </ul>
    </div>
  </div>
</footer>
