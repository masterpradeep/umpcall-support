<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/logo.svg' | relative_url }}" alt="" width="36" height="36" class="brand-icon">
      <span class="brand-text">UmpCall</span>
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} aria-current="page"{% endif %}>Home</a>
      <a href="{{ '/privacy/' | relative_url }}"{% if page.url contains '/privacy' %} aria-current="page"{% endif %}>Privacy</a>
      <a href="{{ '/support/' | relative_url }}"{% if page.url contains '/support' %} aria-current="page"{% endif %}>Support</a>
      <a href="{{ '/terms/' | relative_url }}"{% if page.url contains '/terms' %} aria-current="page"{% endif %}>Terms</a>
    </nav>
    <a class="btn btn-sm btn-primary header-cta" href="{{ '/support/' | relative_url }}">Get help</a>
  </div>
</header>
