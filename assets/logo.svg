<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background circle -->
  <circle cx="512" cy="512" r="512" fill="#0D0D0D"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#4FC3F7" stroke-width="8"/>

  <!-- Cricket stump - vertical bar representing umpire authority -->
  <rect x="484" y="320" width="56" height="400" rx="28" fill="#FFFFFF"/>

  <!-- Bail on top - horizontal element -->
  <rect x="440" y="290" width="144" height="36" rx="18" fill="#FFD54F"/>

  <!-- Coin circle - representing the toss -->
  <circle cx="512" cy="200" r="70" fill="none" stroke="#FFD54F" stroke-width="8"/>
  <text x="512" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFD54F">U</text>

  <!-- Six dots at bottom representing ball count (6 balls per over) -->
  <circle cx="372" cy="780" r="18" fill="#4FC3F7"/>
  <circle cx="428" cy="780" r="18" fill="#4FC3F7"/>
  <circle cx="484" cy="780" r="18" fill="#4FC3F7"/>
  <circle cx="540" cy="780" r="18" fill="#4FC3F7" opacity="0.4"/>
  <circle cx="596" cy="780" r="18" fill="#4FC3F7" opacity="0.4"/>
  <circle cx="652" cy="780" r="18" fill="#4FC3F7" opacity="0.4"/>
</svg>
